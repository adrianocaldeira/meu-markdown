# Gitleaks configuration — Meu Markdown
# Estende as regras padrão e adiciona allowlist específica do projeto.
# Docs: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

[extend]
useDefault = true

[allowlist]
description = "Allowlist global do Meu Markdown"

paths = [
  '''\.gitleaks\.toml$''',
  '''(?i)\.git/''',
  '''(?i)bin/''',
  '''(?i)obj/''',
  '''(?i)publish/''',
  '''(?i)installer/dist/''',
  '''(?i)webview2userdata/''',
  '''\.lock$''',
  '''\.png$''',
  '''\.ico$''',
  '''\.jpg$''',
  '''\.svg$''',
]

regexes = [
  # Scheme interno usado pelo MarkdownPreview para servir assets locais
  '''https?://local\.assets/[^\s]*''',
  # Namespaces XAML do WPF/AvalonEdit (não são URLs reais)
  '''http://schemas\.microsoft\.com/winfx/2006/xaml[^"\s]*''',
  '''http://icsharpcode\.net/sharpdevelop/avalonedit''',
]
