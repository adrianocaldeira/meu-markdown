<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>{{CSS}}</style>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f2328;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #0969da;
            --code-inline-bg: #f3f4f6;
            --code-block-bg: #f6f8fa;
            --th-bg: #f6f8fa;
            --row-alt: #fafbfc;
            --quote-bg: transparent;
        }
        body.dark {
            --bg: #1e1e1e;
            --text: #d4d4d4;
            --muted: #9ca3af;
            --border: #3c3c3c;
            --accent: #58a6ff;
            --code-inline-bg: #2d2d2d;
            --code-block-bg: #1a1a1a;
            --th-bg: #2a2a2a;
            --row-alt: #232323;
            --quote-bg: #252526;
        }

        body {
            margin: 0;
            padding: 32px 48px;
            font: 16px/1.7 "Inter", "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: var(--bg);
            scroll-behavior: smooth;
        }
        .markdown-body {
            max-width: 760px;
            margin: 0 auto;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            line-height: 1.3;
        }
        h1 { font-size: 2em; margin: 1.4em 0 0.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        h2 { font-size: 1.5em; margin: 1.6em 0 0.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
        h3 { font-size: 1.25em; margin: 1.4em 0 0.5em; }
        h4 { font-size: 1.1em; margin: 1.2em 0 0.5em; }
        h5, h6 { font-size: 1em; margin: 1.2em 0 0.4em; }

        p, ul, ol, blockquote { margin: 1em 0; }
        ul, ol { padding-left: 2em; }
        li { margin: 0.3em 0; }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        code {
            font: 13px/1.5 "Cascadia Code", "JetBrains Mono", "Fira Code", Consolas, monospace;
            background: var(--code-inline-bg);
            padding: 0.15em 0.4em;
            border-radius: 4px;
        }
        pre {
            background: var(--code-block-bg);
            padding: 16px 20px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }
        pre code { background: none; padding: 0; font-size: 13px; }

        blockquote {
            border-left: 4px solid var(--accent);
            padding: 4px 16px;
            color: var(--muted);
            background: var(--quote-bg);
            margin-left: 0;
        }

        table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
        th { background: var(--th-bg); font-weight: 600; }
        tr:nth-child(even) td { background: var(--row-alt); }

        img { max-width: 100%; height: auto; border-radius: 6px; }

        hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

        input[type="checkbox"] { margin-right: 4px; }

        @media print {
            body { max-width: none; padding: 0; color: black; background: white; }
            .markdown-body { max-width: none; }
            a { color: inherit; text-decoration: none; }
            a[href^="http"]::after { content: " (" attr(href) ")"; font-size: 0.85em; color: #666; }
            pre, blockquote, table { page-break-inside: avoid; }
            h1, h2, h3 { page-break-after: avoid; }
        }
    </style>
</head>
<body>
    <div id="content" class="markdown-body">{{CONTENT}}</div>
    <script>
        function updateContent(html) {
            document.getElementById('content').innerHTML = html;
        }
        function setTheme(dark) {
            document.body.className = dark ? 'dark' : '';
        }

        let __suppressSync = false;
        let __syncTimeout = null;

        function syncScrollToLine(n) {
            if (__suppressSync) return;
            const blocks = document.querySelectorAll('[data-line]');
            let target = null;
            for (const b of blocks) {
                const line = parseInt(b.dataset.line, 10);
                if (line <= n) target = b;
                else break;
            }
            if (target) {
                __suppressSync = true;
                target.scrollIntoView({ behavior: 'auto', block: 'start' });
                clearTimeout(__syncTimeout);
                __syncTimeout = setTimeout(() => { __suppressSync = false; }, 100);
            }
        }

        window.addEventListener('scroll', () => {
            if (__suppressSync) return;
            if (typeof chrome === 'undefined' || !chrome.webview) return;
            const blocks = document.querySelectorAll('[data-line]');
            let topLine = 1;
            const scrollTop = window.scrollY;
            for (const b of blocks) {
                const rect = b.getBoundingClientRect();
                if (rect.top + window.scrollY <= scrollTop + 50)
                    topLine = parseInt(b.dataset.line, 10);
                else
                    break;
            }
            __suppressSync = true;
            clearTimeout(__syncTimeout);
            __syncTimeout = setTimeout(() => { __suppressSync = false; }, 100);
            chrome.webview.postMessage(JSON.stringify({ type: 'scroll', line: topLine }));
        }, { passive: true });
    </script>
</body>
</html>
