<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>{{CSS}}</style>
    <style>
        body {
            margin: 0;
            padding: 16px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #24292e;
            background-color: #ffffff;
        }
        body.dark {
            color: #c9d1d9;
            background-color: #0d1117;
        }
        .markdown-body {
            max-width: 980px;
            margin: 0 auto;
        }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        body.dark a { color: #58a6ff; }
        img { max-width: 100%; }
        pre {
            background-color: #f6f8fa;
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
        }
        body.dark pre { background-color: #161b22; }
        code {
            background-color: #f6f8fa;
            border-radius: 3px;
            padding: 0.2em 0.4em;
            font-size: 85%;
        }
        body.dark code { background-color: #161b22; }
        pre code { background: none; padding: 0; }
        blockquote {
            border-left: 4px solid #dfe2e5;
            margin: 0;
            padding: 0 16px;
            color: #6a737d;
        }
        body.dark blockquote { border-left-color: #3b434b; color: #8b949e; }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        table th, table td {
            border: 1px solid #dfe2e5;
            padding: 6px 13px;
        }
        body.dark table th, body.dark table td { border-color: #3b434b; }
        table tr:nth-child(2n) { background-color: #f6f8fa; }
        body.dark table tr:nth-child(2n) { background-color: #161b22; }
        hr { border: none; border-top: 1px solid #dfe2e5; }
        body.dark hr { border-top-color: #3b434b; }
        input[type="checkbox"] { margin-right: 4px; }
    </style>
</head>
<body>
    <div id="content" class="markdown-body">{{CONTENT}}</div>
    <script>
        function updateContent(html) {
            document.getElementById('content').innerHTML = html;
        }
        function setTheme(dark) {
            document.body.className = dark ? 'dark' : '';
        }
    </script>
</body>
</html>
