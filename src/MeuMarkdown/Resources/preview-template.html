<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>{{CSS}}
{{KATEX_CSS}}</style>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f2328;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #0969da;
            --code-inline-bg: #f3f4f6;
            --code-block-bg: #f6f8fa;
            --th-bg: #f6f8fa;
            --row-alt: #fafbfc;
            --quote-bg: transparent;
        }
        body.dark {
            --bg: #1e1e1e;
            --text: #d4d4d4;
            --muted: #888888;
            --border: #2a2a2a;
            --accent: #e8a87c;
            --code-inline-bg: #2a2a2a;
            --code-block-bg: #161616;
            --th-bg: #232323;
            --row-alt: #1f1f1f;
            --quote-bg: #232323;
        }

        body {
            margin: 0;
            padding: 32px 48px;
            font: 16px/1.7 "Inter", "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: var(--bg);
            scroll-behavior: smooth;
        }
        .markdown-body {
            max-width: 760px;
            margin: 0 auto;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            font-weight: 600;
            line-height: 1.3;
        }
        .markdown-body h1 { font-size: 2em; margin: 1.4em 0 0.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; margin: 1.6em 0 0.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
        .markdown-body h3 { font-size: 1.25em; margin: 1.4em 0 0.5em; }
        .markdown-body h4 { font-size: 1.1em; margin: 1.2em 0 0.5em; }
        .markdown-body h5, .markdown-body h6 { font-size: 1em; margin: 1.2em 0 0.4em; }

        .markdown-body p, .markdown-body ul, .markdown-body ol, .markdown-body blockquote { margin: 1em 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 2em; }
        .markdown-body li { margin: 0.3em 0; }

        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }

        .markdown-body code {
            font: 13px/1.5 "Cascadia Code", "JetBrains Mono", "Fira Code", Consolas, monospace;
            background: var(--code-inline-bg);
            padding: 0.15em 0.4em;
            border-radius: 4px;
        }
        .markdown-body pre {
            background: var(--code-block-bg);
            padding: 16px 20px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }
        .markdown-body pre code { background: none; padding: 0; font-size: 13px; }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding: 4px 16px;
            color: var(--muted);
            background: var(--quote-bg);
            margin-left: 0;
        }

        .markdown-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
        .markdown-body th { background: var(--th-bg); font-weight: 600; }
        .markdown-body tr:nth-child(even) td { background: var(--row-alt); }

        .markdown-body img { max-width: 100%; height: auto; border-radius: 6px; }

        .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

        .markdown-body .wikilink { color: var(--accent); }
        .markdown-body .wikilink-broken {
            color: #c44;
            text-decoration: line-through wavy;
            cursor: not-allowed;
        }
        body.dark .markdown-body .wikilink-broken { color: #e57373; }

        .markdown-body input[type="checkbox"] { margin-right: 4px; }

        /* Mermaid: afordância de clique-para-zoom (só diagramas renderizados com SVG). */
        .markdown-body .mermaid[data-zoomable] { cursor: zoom-in; border-radius: 6px; transition: outline-color 0.12s; outline: 2px solid transparent; outline-offset: 4px; }
        .markdown-body .mermaid[data-zoomable]:hover { outline-color: var(--accent); }

        /* Lightbox de zoom do Mermaid. */
        #mm-zoom-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.6); overflow: hidden;
        }
        body.dark #mm-zoom-overlay { background: rgba(0, 0, 0, 0.8); }
        #mm-zoom-stage {
            position: absolute; top: 0; left: 0;
            transform-origin: 0 0; will-change: transform;
            cursor: grab; user-select: none;
        }
        #mm-zoom-stage.dragging { cursor: grabbing; }
        #mm-zoom-stage svg { display: block; max-width: none; height: auto; }
        #mm-zoom-controls {
            position: fixed; top: 16px; right: 16px; z-index: 10000;
            display: flex; gap: 8px;
        }
        #mm-zoom-controls button {
            width: 40px; height: 40px; border: none; border-radius: 8px;
            background: rgba(255, 255, 255, 0.92); color: #1f2328;
            font-size: 20px; line-height: 1; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            display: flex; align-items: center; justify-content: center;
        }
        #mm-zoom-controls button:hover { background: #fff; }

        @media print {
            #mm-zoom-overlay { display: none !important; }
            body { max-width: none; padding: 0; color: black; background: white; }
            .markdown-body { max-width: none; }
            .markdown-body a { color: inherit; text-decoration: none; }
            .markdown-body a[href^="http"]::after { content: " (" attr(href) ")"; font-size: 0.85em; color: #666; }
            .markdown-body pre, .markdown-body blockquote, .markdown-body table { page-break-inside: avoid; }
            .markdown-body h1, .markdown-body h2, .markdown-body h3 { page-break-after: avoid; }
        }
    </style>
</head>
<body>
    <div id="content" class="markdown-body">{{CONTENT}}</div>
    <script src="https://mm.local/katex.min.js"></script>
    <script src="https://mm.local/katex-auto-render.min.js"></script>
    <script src="https://mm.local/mermaid.min.js"></script>
    <script>
        if (window.mermaid) {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'default',
                securityLevel: 'strict'
            });
        }
    </script>
    <script>
        async function renderEnhancements() {
            // Mermaid: o Markdig com UseAdvancedExtensions já gera <pre class="mermaid">
            // direto (sem child <code>). Também aceitamos <pre><code class="language-mermaid">
            // caso essa heurística mude. Em ambos os casos, convertemos pra <div class="mermaid">
            // que é o formato esperado pelo mermaid.run, e preservamos source em data-source.
            document.querySelectorAll('pre.mermaid, pre code.language-mermaid').forEach(el => {
                const source = el.textContent;
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = source;
                div.setAttribute('data-source', source);
                const pre = el.tagName === 'PRE' ? el : el.closest('pre');
                if (pre) pre.replaceWith(div); else el.replaceWith(div);
            });
            if (window.mermaid) {
                try { await mermaid.run({ querySelector: '.mermaid' }); }
                catch (e) { /* Mermaid renderiza box de erro inline */ }
            }
            markZoomableMermaid();

            // KaTeX: Markdig.UseMathematics emite <span class="math">\(expr\)</span> pra inline
            // e <div class="math">\[expr\]</div> pra bloco. Os delimitadores podem ser \(..\),
            // \[..\], $..$ ou $$..$$ dependendo da versão do Markdig. Strip todos e renderiza.
            if (window.katex) {
                document.querySelectorAll('.math').forEach(el => {
                    if (el.dataset.katexRendered) return;
                    let expr = el.textContent.trim();
                    let isBlock = el.tagName.toLowerCase() === 'div';

                    if (expr.startsWith('$$') && expr.endsWith('$$')) {
                        expr = expr.slice(2, -2); isBlock = true;
                    } else if (expr.startsWith('\\[') && expr.endsWith('\\]')) {
                        expr = expr.slice(2, -2); isBlock = true;
                    } else if (expr.startsWith('\\(') && expr.endsWith('\\)')) {
                        expr = expr.slice(2, -2);
                    } else if (expr.startsWith('$') && expr.endsWith('$')) {
                        expr = expr.slice(1, -1);
                    }
                    expr = expr.trim();

                    try {
                        katex.render(expr, el, { displayMode: isBlock, throwOnError: false });
                        el.dataset.katexRendered = '1';
                    } catch (e) { /* katex renderiza erro inline */ }
                });
            }
        }

        async function updateContent(html) {
            document.getElementById('content').innerHTML = html;
            await renderEnhancements();
        }
        async function setTheme(dark) {
            document.body.className = dark ? 'dark' : '';
            if (window.mermaid) {
                mermaid.initialize({
                    startOnLoad: false,
                    theme: dark ? 'dark' : 'default',
                    securityLevel: 'strict'
                });
                // Re-renderiza diagramas existentes com a nova paleta.
                document.querySelectorAll('.mermaid').forEach(el => {
                    el.removeAttribute('data-processed');
                    const original = el.getAttribute('data-source') ?? el.textContent;
                    el.textContent = original;
                });
                try { await mermaid.run({ querySelector: '.mermaid' }); } catch (e) {}
                markZoomableMermaid();
            }
        }

        // Marca como zoomável só os diagramas que renderizaram um <svg> de fato
        // (exclui caixas de erro). Habilita o cursor zoom-in e o clique do lightbox.
        function markZoomableMermaid() {
            document.querySelectorAll('.mermaid').forEach(el => {
                if (el.querySelector('svg')) el.setAttribute('data-zoomable', '');
                else el.removeAttribute('data-zoomable');
            });
        }

        let __suppressSync = false;
        let __syncTimeout = null;

        function syncScrollToLine(n) {
            if (__suppressSync) return;
            const blocks = document.querySelectorAll('[data-line]');
            let target = null;
            for (const b of blocks) {
                const line = parseInt(b.dataset.line, 10);
                if (line <= n) target = b;
                else break;
            }
            if (target) {
                __suppressSync = true;
                target.scrollIntoView({ behavior: 'auto', block: 'start' });
                clearTimeout(__syncTimeout);
                __syncTimeout = setTimeout(() => { __suppressSync = false; }, 100);
            }
        }

        // Após o load inicial (HTML estático via NavigateToString), Mermaid/KaTeX
        // ainda não foram processados — o updateContent só roda em updates incrementais.
        // Aqui disparamos a renderização inicial.
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => { renderEnhancements().catch(() => {}); });
        } else {
            renderEnhancements().catch(() => {});
        }

        // Normaliza um texto para o mesmo formato de id que o Markdig (UseAutoIdentifiers)
        // gera para os headings: remove diacríticos (ç→c, ã→a, â→a), minúsculas, e colapsa
        // qualquer sequência de não-alfanuméricos num único "-". Sem isso, links como
        // "#introdução" (com acento) não casariam com o id real "introducao".
        function __slugify(s) {
            return s.normalize('NFD').replace(new RegExp('[\\u0300-\\u036f]', 'g'), '')
                    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        }

        // Links âncora intra-documento (href="#secao") não navegam sozinhos: o preview
        // é carregado via NavigateToString (URI base data:...), e o handler nativo
        // NavigationStarting cancela navegações data: iniciadas pelo usuário por segurança.
        // Interceptamos o clique aqui e fazemos o scroll manualmente. Delegação no document
        // para sobreviver às trocas de conteúdo via updateContent (innerHTML).
        document.addEventListener('click', (ev) => {
            const a = ev.target.closest ? ev.target.closest('a[href^="#"]') : null;
            if (!a) return;
            ev.preventDefault();
            const href = a.getAttribute('href');
            if (!href || href === '#') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            let id = href.slice(1);
            try { id = decodeURIComponent(id); } catch (e) { /* mantém o valor bruto */ }

            // 1) match exato (ids explícitos / custom anchors).
            let target = document.getElementById(id);
            // 2) match por slug normalizado — os ids do Markdig já são slugs, então
            //    slugificar o fragment do link (que pode ter acentos/maiúsculas) faz casar.
            if (!target) target = document.getElementById(__slugify(id));
            // 3) último recurso: varre todos os elementos com id comparando o slug.
            if (!target) {
                const slug = __slugify(id);
                target = Array.prototype.find.call(
                    document.querySelectorAll('[id]'),
                    el => __slugify(el.id) === slug) || null;
            }
            // 4) fallback final: anchors antigos via <a name="...">.
            if (!target) {
                try {
                    const sel = (window.CSS && CSS.escape) ? CSS.escape(id) : id;
                    target = document.querySelector('[name="' + sel + '"]');
                } catch (e) { /* seletor inválido: ignora */ }
            }
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        // ===== Lightbox de zoom do Mermaid =====
        // Clique num diagrama renderizado abre um overlay fullscreen com um clone do SVG.
        // Scroll = zoom no cursor, arrastar = pan, botões e Esc/clique no fundo controlam.
        (function () {
            let overlay = null, stage = null, svgEl = null;
            let scale = 1, tx = 0, ty = 0, natW = 0, natH = 0;
            const MIN = 0.1, MAX = 20;

            function apply() {
                stage.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
            }
            function clamp(s) { return Math.min(MAX, Math.max(MIN, s)); }

            function fit() {
                const vw = window.innerWidth, vh = window.innerHeight;
                const margin = 0.92;
                scale = clamp(Math.min(vw * margin / natW, vh * margin / natH));
                tx = (vw - natW * scale) / 2;
                ty = (vh - natH * scale) / 2;
                apply();
            }
            // Zoom mantendo fixo o ponto (cx,cy) em coordenadas de viewport.
            function zoomAt(cx, cy, factor) {
                const ns = clamp(scale * factor);
                tx = cx - (cx - tx) * (ns / scale);
                ty = cy - (cy - ty) * (ns / scale);
                scale = ns;
                apply();
            }

            function close() {
                if (!overlay) return;
                document.removeEventListener('keydown', onKey);
                overlay.remove();
                overlay = stage = svgEl = null;
            }
            function onKey(e) { if (e.key === 'Escape') close(); }

            function open(mermaidEl) {
                const orig = mermaidEl.querySelector('svg');
                if (!orig) return;
                const rect = orig.getBoundingClientRect();
                natW = rect.width || 600;
                natH = rect.height || 400;

                overlay = document.createElement('div');
                overlay.id = 'mm-zoom-overlay';

                stage = document.createElement('div');
                stage.id = 'mm-zoom-stage';
                svgEl = orig.cloneNode(true);
                svgEl.style.maxWidth = 'none';
                svgEl.style.width = natW + 'px';
                svgEl.style.height = natH + 'px';
                stage.appendChild(svgEl);
                overlay.appendChild(stage);

                const controls = document.createElement('div');
                controls.id = 'mm-zoom-controls';
                const mkBtn = (label, title, fn) => {
                    const b = document.createElement('button');
                    b.textContent = label; b.title = title;
                    b.addEventListener('click', (e) => { e.stopPropagation(); fn(); });
                    controls.appendChild(b);
                };
                mkBtn('+', 'Aproximar', () => zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1.25));
                mkBtn('−', 'Afastar', () => zoomAt(window.innerWidth / 2, window.innerHeight / 2, 1 / 1.25));
                mkBtn('⤢', 'Ajustar à tela', fit);
                mkBtn('×', 'Fechar (Esc)', close);
                overlay.appendChild(controls);

                // Clique no fundo (não no diagrama) fecha.
                overlay.addEventListener('mousedown', (e) => { if (e.target === overlay) close(); });

                // Scroll = zoom no cursor.
                overlay.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.1 : 1 / 1.1);
                }, { passive: false });

                // Arrastar = pan.
                let dragging = false, lastX = 0, lastY = 0;
                stage.addEventListener('pointerdown', (e) => {
                    dragging = true; lastX = e.clientX; lastY = e.clientY;
                    stage.classList.add('dragging');
                    stage.setPointerCapture(e.pointerId);
                });
                stage.addEventListener('pointermove', (e) => {
                    if (!dragging) return;
                    tx += e.clientX - lastX; ty += e.clientY - lastY;
                    lastX = e.clientX; lastY = e.clientY;
                    apply();
                });
                const endDrag = (e) => {
                    dragging = false; stage.classList.remove('dragging');
                    try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
                };
                stage.addEventListener('pointerup', endDrag);
                stage.addEventListener('pointercancel', endDrag);

                document.body.appendChild(overlay);
                document.addEventListener('keydown', onKey);
                fit();
            }

            document.addEventListener('click', (ev) => {
                const el = ev.target.closest ? ev.target.closest('.mermaid[data-zoomable]') : null;
                if (!el || overlay) return;
                open(el);
            });
        })();

        window.addEventListener('scroll', () => {
            if (__suppressSync) return;
            if (typeof chrome === 'undefined' || !chrome.webview) return;
            const blocks = document.querySelectorAll('[data-line]');
            let topLine = 1;
            const scrollTop = window.scrollY;
            for (const b of blocks) {
                const rect = b.getBoundingClientRect();
                if (rect.top + window.scrollY <= scrollTop + 50)
                    topLine = parseInt(b.dataset.line, 10);
                else
                    break;
            }
            __suppressSync = true;
            clearTimeout(__syncTimeout);
            __syncTimeout = setTimeout(() => { __suppressSync = false; }, 100);
            chrome.webview.postMessage(JSON.stringify({ type: 'scroll', line: topLine }));
        }, { passive: true });
    </script>
</body>
</html>
