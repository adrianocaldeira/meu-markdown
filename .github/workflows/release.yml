name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ex: v1.2.0). Cria a tag se não existir.'
        required: true

permissions:
  contents: write

jobs:
  build-release:
    name: build + installer + release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build (Release)
        run: dotnet build -c Release

      - name: Test (gate antes do publish)
        run: dotnet test -c Release --no-build --logger "trx;LogFileName=results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: TestResults/*.trx
          retention-days: 30

      - name: Publish single-file
        run: dotnet publish src/MeuMarkdown/MeuMarkdown.csproj -c Release --no-build

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Read version from Directory.Build.props
        id: version
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version.Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Build installer
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.version.outputs.version }} installer\MeuMarkdown.iss'

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF -replace '^refs/tags/','' } else { '${{ inputs.tag }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $changelog = Get-Content CHANGELOG.md -Raw
          # Captura conteúdo entre "## [X.Y.Z]" e a próxima "## [" (ou EOF)
          $escaped = [regex]::Escape($version)
          $pattern = "(?ms)^## \[$escaped\][^\r\n]*\r?\n(.*?)(?=^## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)
          if ($match.Success) {
              $notes = $match.Groups[1].Value.Trim()
              Write-Host "Release notes extraídos do CHANGELOG seção [$version]:"
              Write-Host $notes
          } else {
              Write-Warning "Seção [$version] não encontrada no CHANGELOG.md — usando fallback."
              $notes = "Release v$version — veja [CHANGELOG.md](https://github.com/$env:GITHUB_REPOSITORY/blob/main/CHANGELOG.md) para detalhes."
          }
          Set-Content -Path release-notes.md -Value $notes -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          files: |
            installer/dist/*.exe
            src/MeuMarkdown/bin/Release/net10.0-windows/win-x64/publish/MeuMarkdown.exe
