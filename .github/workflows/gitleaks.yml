name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Varredura semanal (segunda 06:00 UTC) para pegar segredos que escaparam.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: scan secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
